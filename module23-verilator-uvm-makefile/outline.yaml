- type: title
 title: Makefile knobs for Verilator UVM
 subtitle: Module twenty-two named Verilator as a plausible UVM host
 notes: 'Module twenty-two named Verilator as a plausible UVM host. Module twenty-three
 maps the Makefile knobs on the **in-course** hello example: UVM home, include
 paths, simulator selection, and test name. You are not required to finish a full
 compile here—export UVM home, dry-run make, and confirm sources resolve before
 module twenty-four runs for real.'
- type: bullets
 title: UVM_HOME and include paths
 bullets:
 - Accellera UVM lives outside your DUT tree
 - Point UVM home at the library **src** directory that contains `uvm_pkg.sv`
 - This course does not vendor the full Accellera tree
 - If UVM home is unset or wrong
 notes: Accellera UVM lives outside your DUT tree. Point UVM home at the library
 **src** directory that contains `uvm_pkg.sv`. This course does not vendor the
 full Accellera tree—install the 2017-1.0 tarball yourself, or for local monorepo
 convenience only, point at an existing extract. If UVM home is unset or wrong,
 make fails early with missing uvm_pkg—not mysterious Verilator messages.
- type: bullets
 title: SIM, TEST, and UVM test name
 bullets:
 - The simulator knob selects the Verilator recipe
 - TEST names the SystemVerilog top file
 - At run time the binary needs plus UVM test name matching the registered test class
 - Read the in-course Makefile
 notes: The simulator knob selects the Verilator recipe. TEST names the SystemVerilog
 top file. At run time the binary needs plus UVM test name matching the registered
 test class—here AndGateTest. Read the in-course Makefile; the trio—simulator,
 build top, runtime test name—repeats on every project.
- type: image
 title: Read the Makefile flow
 image: assets/real-shell.png
 caption: Real shell — Makefile dry-run
 notes: In the real UVM track, enter the in-course hello, export UVM home, list dut
 and tb, preview the Makefile, then dry-run so paths are checked without a long
 compile.
- type: code
 title: Read the Makefile flow — try these
 code: '# cd in-course Verilator + UVM hello

 cd courses/learn_uvm2017/examples/verilator-uvm-hello


 # export UVM_HOME — Accellera UVM 2017 src (uvm_pkg.sv lives here)

 export UVM_HOME=/path/to/1800.2-2017-1.0/src


 # ls — confirm Makefile, dut/and_gate.v, tb/test_and_gate_uvm.sv

 ls

 ls dut tb


 # make dry-run — verify UVM_HOME and sources without compiling

 make dry-run

 '
- type: bullets
 title: Common fail modes
 bullets:
 - Wrong or missing UVM home is the fastest failure
 - Running make from the wrong directory misses the Makefile
 - Missing Verilator on PATH fails at compile
 - Mismatch between top module and plus UVM test name yields no tests executed
 - First cold compiles take minutes, that is normal
 - Browser sketch success never substitutes for reading these Makefile errors offline
 notes: Wrong or missing UVM home is the fastest failure. Running make from the wrong
 directory misses the Makefile. Missing Verilator on PATH fails at compile. Mismatch
 between top module and plus UVM test name yields no tests executed. First cold
 compiles take minutes—that is normal. Browser sketch success never substitutes
