title: ConfigDB
footer: learn_uvm2017 — uvm configdb
slides:
- type: title
  title: ConfigDB
  subtitle: After the factory builds your tree
  notes: 'After the factory builds your tree, components still need configuration—virtual
    interfaces, active versus passive mode, timeouts. UVM ConfigDB is the shared bulletin
    board: set a field at a hierarchy path, get it later from a child or sibling subtree
    by walking up. This module is ConfigDB literacy: path, field, value, and which
    match wins. We will use the browser lab for the rules, then anchor them in notes
    you can read offline.'
- type: bullets
  title: Set, get, and path specificity
  bullets:
  - Set stores a typed value under a context path plus field name
  - Get asks from a component path for a field
  - If several sets match, the longest, most specific, path wins
  - A set on env dot agent beats a generic set on env for the same field when the
    getter sits
  - Wrong field name means miss even if another field was set nearby
  - Sibling agents do not see each other’s sets
  notes: Set stores a typed value under a context path plus field name—typical example
    is virtual interface on env dot agent. Get asks from a component path for a field;
    the lookup walks that component, then its parent, then upward until a match appears.
    If several sets match, the longest—most specific—path wins. A set on env dot agent
    beats a generic set on env for the same field when the getter sits under that
    agent. Wrong field name means miss even if another field was set nearby. Sibling
    agents do not see each other’s sets—a driver under agent one cannot get a vif
    set only on agent zero.
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: ConfigDB lab starter
  notes: In the browser lab track, open the ConfigDB key path lab. You will see set
    entries, a get path and field, and the walk-up trace. Load the starter preset—vif
    set on env dot agent, get from env dot agent dot drv. Run get and read which entry
    matched and why. Try the wrong-field preset to see a clean miss. Try the more-specific-wins
    preset when both env and env dot agent set the same field. Work a few challenges,
    then Check. The lab teaches lookup rules—not a full simulator compile.
- type: image
  title: Real UVM literacy
  image: assets/real-shell.png
  caption: Real shell — ConfigDB sketch
  notes: In the real UVM track, open this module’s examples folder and read the set-get
    sketch—it mirrors the browser tables in plain language. Practice saying set path,
    field, value, then get path, field, and expected winner. If the legacy offline
    course is checked out, skim the config DB header or any test that sets a virtual
    interface on an agent—the same triple appears in SystemVerilog macros. You are
    learning where vif handles live before you debug a null-interface crash.
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not set after the getter already ran in build
  - Do not typo the field string, vif and VIF are different keys
  - Do not expect sideways visibility
  - And remember
  notes: 'Do not set after the getter already ran in build—configure early, get in
    build or connect as intended. Do not typo the field string—vif and VIF are different
    keys. Do not expect sideways visibility—sibling subtrees need their own sets or
    a common ancestor path. And remember: the browser model simplifies resource scope;
    offline UVM also has instance name arguments and typed get that must match.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - In the browser, run get on the starter and explain the winning path without looking
  - On real UVM, sketch one set and one get for passing a virtual interface to a driver
  - When you are ready, take the short quiz, then continue to agent anatomy in the
    next module
  notes: Complete the checklist for at least one track—preferably both. In the browser,
    run get on the starter and explain the winning path without looking. On real UVM,
    sketch one set and one get for passing a virtual interface to a driver. When you
    are ready, take the short quiz, then continue to agent anatomy in the next module.
