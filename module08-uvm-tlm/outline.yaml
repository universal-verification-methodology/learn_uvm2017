title: TLM ports
footer: learn_uvm2017 — uvm tlm
slides:
- type: title
  title: TLM ports
  subtitle: UVM components talk through TLM ports and exports, not by reaching into
    each other’s pins
  notes: 'UVM components talk through TLM ports and exports—not by reaching into each
    other’s pins. Connect phase is where you wire them: port on the initiator side,
    export on the target side, then connect. This module covers the three patterns
    you will see everywhere—seq item for driver and sequencer, put and get for push
    or pull, and analysis for monitor broadcast. We will sketch them in the browser
    lab, then read the same wiring in offline notes.'
- type: bullets
  title: Port, export, and the three patterns
  bullets:
  - Think port connects to export
  - Seq item is the classic pull path
  - Put and get are push or pull styles between producer and consumer blocks
  - Analysis is different, it is a broadcast
  - You wire all of this in connect phase, after build has created the port objects
  notes: 'Think port connects to export—the port side initiates, the export side implements
    the call. Seq item is the classic pull path: the driver’s seq item port connects
    to the sequencer’s seq item export, then get next item and item done move transactions.
    Put and get are push or pull styles between producer and consumer blocks. Analysis
    is different—it is a broadcast: the monitor’s analysis port write fans out to
    scoreboard imports and other subscribers. You wire all of this in connect phase,
    after build has created the port objects.'
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: TLM port wiring lab starter
  notes: In the browser lab track, open the TLM port wiring lab. The starter loads
    both classic links—driver to sequencer on seq item, and monitor analysis to scoreboard.
    Try Connect and Disconnect to see when sends fail. Switch kind to analysis and
    hit Demo analysis to watch a write broadcast. Load the put preset to see push-style
    wiring. Work a few challenges, then Check. The lab is literacy—you still type
    connect calls in real UVM.
- type: image
  title: Real UVM literacy
  image: assets/real-shell.png
  caption: Real shell — TLM wiring sketch
  notes: In the real UVM track, open this module’s wiring sketch—it lists connect
    calls in plain language for each pattern. Trace seq item on the stimulus path
    and analysis on the observe path in one agent hookup. If the in-course hello
    is checked out, grep for seq item port connect in module eight examples—you will
    see driver dot seq item port dot connect to sequencer dot seq item export, and
    monitor analysis port to scoreboard import. Same picture, real SystemVerilog.
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not wire ports in build, they may not exist yet; connect phase is the usual
    place
  - Do not confuse port and export direction, initiator connects to target
  - Do not forget item done after get next item or the sequencer stalls
  - Analysis write is one-to-many, not a paired export like seq item
  - And remember
  notes: 'Do not wire ports in build—they may not exist yet; connect phase is the
    usual place. Do not confuse port and export direction—initiator connects to target.
    Do not forget item done after get next item or the sequencer stalls. Analysis
    write is one-to-many, not a paired export like seq item. And remember: the browser
    lab shows the topology; your testbench still needs the actual connect statements
    in connect phase.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - In the browser, load starter, disconnect analysis, and explain what breaks
  - On real UVM, sketch seq item and analysis links for one active agent
  - When you are ready, take the short quiz, then continue to sequence flow in the
    next module
  notes: Complete the checklist for at least one track—preferably both. In the browser,
    load starter, disconnect analysis, and explain what breaks. On real UVM, sketch
    seq item and analysis links for one active agent. When you are ready, take the
    short quiz, then continue to sequence flow in the next module.
