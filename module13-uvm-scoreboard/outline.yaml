title: Scoreboard
footer: learn_uvm2017 — uvm scoreboard
slides:
- type: title
  title: Scoreboard
  subtitle: A scoreboard checks that what you predicted matches what the DUT actually
    did
  notes: A scoreboard checks that what you predicted matches what the DUT actually
    did. Predicted transactions land in an expect queue; observed transactions from
    the monitor land in actual. Compare pops the fronts and checks for a match—or
    reports a mismatch. This module is the expect versus actual pipeline in miniature.
    We will push and compare in the browser lab, then read the same queues in offline
    notes.
- type: bullets
  title: Predict, observe, compare
  bullets:
  - The predict path builds what should happen
  - The observe path is the monitor analysis port, real bus activity becomes actual
  - 'Compare is the heartbeat: pop one from each queue, check equality, repeat'
  - A pass means the values matched; a fail means expect and actual differed
  - Orphans are leftovers, expect with no actual means you predicted something never
    observed
  - Both are usually bugs at end of test
  notes: 'The predict path builds what should happen—a reference model or checker
    pushes into expect. The observe path is the monitor analysis port—real bus activity
    becomes actual. Compare is the heartbeat: pop one from each queue, check equality,
    repeat. A pass means the values matched; a fail means expect and actual differed.
    Orphans are leftovers—expect with no actual means you predicted something never
    observed; actual with no expect means you saw traffic you never predicted. Both
    are usually bugs at end of test.'
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: Scoreboard lab starter
  notes: In the browser lab track, open the scoreboard expect actual lab. The starter
    loads expect and actual both holding hex A five—click Compare for pass. Load mismatch
    to see A five versus five A fail. Try orphan expect and orphan actual presets
    to see one-sided leftovers. Push expect and push actual manually from empty, then
    compare step by step. Work a few challenges, then Check. The lab is literacy;
    real UVM uses analysis imports and write methods on the scoreboard class.
- type: image
  title: Real UVM literacy
  image: assets/real-shell.png
  caption: Real shell — scoreboard sketch
  notes: In the real UVM track, open this module’s scoreboard sketch—it lists expect
    and actual queues and compare in plain language. Trace how monitor analysis connects
    to actual import and how a reference model feeds expect. If the offline
    course is checked out, grep for uvm scoreboard in a module eight test—you will
    see write expected and write actual functions with queue pop loops. TLM analysis
    from module eight is what fills these queues.
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not compare without both queues having data
  - Do not ignore leftover queues at test end, orphans mean missing stimulus or missing
    checks
  - Do not assume in-order compare works for every protocol
  - And remember
  notes: 'Do not compare without both queues having data—or you get orphan reports
    instead of a clean match. Do not ignore leftover queues at test end—orphans mean
    missing stimulus or missing checks. Do not assume in-order compare works for every
    protocol—some designs need out-of-order scoreboards. And remember: the browser
    lab compares hex strings; real scoreboards compare full transaction objects field
    by field.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - In the browser, run starter compare pass then demo mismatch and name the verdict
  - On real UVM, sketch predict and observe paths into one scoreboard
  - When you are ready, take the short quiz, then continue to RAL map in the next
    module
  notes: Complete the checklist for at least one track—preferably both. In the browser,
    run starter compare pass then demo mismatch and name the verdict. On real UVM,
    sketch predict and observe paths into one scoreboard. When you are ready, take
    the short quiz, then continue to RAL map in the next module.
